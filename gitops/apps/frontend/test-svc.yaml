apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: nginx   # Important: this must match the service selector
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
spec:
  type: LoadBalancer
  selector:
    app: nginx   # Matches pod label
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80